<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PBH-BTN/BTN-Collected-Rules</title>
  <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/github-markdown-css/github-markdown-light.min.css"/>
  <style>
    body {
      background: #f6f8fa;
      margin: 0;
      padding: 32px 16px;
    }
    .markdown-body {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px;
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="content" class="markdown-body">Loading... Please enable JavaScript from your browser.</div>
  <script src="https://fastly.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    fetch("README.md")
    .then(x => x.text())
    .then(y => {
      document.getElementById('content').innerHTML =
      marked.parse(y);
    });
  </script>
</body>
</html>
